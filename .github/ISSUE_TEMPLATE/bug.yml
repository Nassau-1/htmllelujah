name: Bug report
description: Report a reproducible problem without attaching confidential deck content.
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not upload confidential presentations, logs containing document content, or credentials.
  - type: input
    id: version
    attributes:
      label: HTMLlelujah version
      placeholder: 0.1.0
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
